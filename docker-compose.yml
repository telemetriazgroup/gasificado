services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gasificado
      POSTGRES_PASSWORD: gasificado
      POSTGRES_DB: gasificado
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gasificado -d gasificado"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://gasificado:gasificado@db:5432/gasificado
      TCP_BRIDGE_URL: http://tcp_bridge:8081
    volumes:
      - rawlogs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "9070:8000"

  port_cleaner:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ids=$$(docker ps -q --filter publish=9970 2>/dev/null || true)
        if [ -n "$$ids" ]; then
          echo "Deteniendo contenedor(es) previos en puerto 9970: $$ids"
          docker stop --time 5 $$ids || true
          sleep 2
        fi
        echo "Puerto 9970 listo"
    restart: "no"

  tcp_bridge:
    build: ./tcp_bridge
    ports:
      - "9970:9970"
    environment:
      TCP_HOST: "0.0.0.0"
      TCP_PORT: "9970"
      BACKEND_URL: http://backend:8000
      HTTP_PORT: "8081"
      LEGACY_API_URL: ${LEGACY_API_URL:-}
      LEGACY_API_URL2: ${LEGACY_API_URL2:-}
    depends_on:
      backend:
        condition: service_started
      port_cleaner:
        condition: service_completed_successfully

  frontend:
    build: ./frontend
    ports:
      - "8087:80"
    depends_on:
      - backend

volumes:
  pgdata:
  rawlogs:
